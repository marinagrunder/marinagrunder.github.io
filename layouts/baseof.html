<!DOCTYPE html>
<html lang="{{ site.Language.Locale }}" dir="{{ or site.Language.Direction `ltr` }}">
<head>
  {{ partial "head.html" . }}
</head>
<body>
  <div id="header-block">
    <header>
      {{ partial "header.html" . }}
    </header>
  </div>
  <div id="main-block">
    <main>
      {{ block "main" . }}{{ end }}
    </main>
    <footer>
      {{ partial "footer.html" . }}
    </footer>
  </div>
  {{ partial "svg.html" . }}
</body>
</html>
