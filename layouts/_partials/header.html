<svg id="header-logo">
  <use xlink:href="#logo"></use>
</svg>
<nav>
  {{- $currentPage := . }}
  {{- range .Site.Menus.main.ByWeight }}
  <a class="menu-entry{{ if or (and (.Page.IsAncestor $currentPage) (not .Page.IsHome)) ($currentPage.IsMenuCurrent .Menu .) }} menu-current{{ end }}" href="{{ .URL }}">
    {{- .Name -}}
  </a>
  {{- else }}
  {{- end }}
</nav>
